<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Groepsverdeler</title>
<style>
  :root {
    --accent: #2E75B6;
    --accent-dark: #1d5689;
    --bg: #f7f6f2;
    --surface: #ffffff;
    --border: #e3e1d8;
    --text: #2c2c2a;
    --text-muted: #75736c;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    margin: 0;
    background: linear-gradient(135deg, #3FA776 0%, #7C52A5 100%);
    background-attachment: fixed;
    min-height: 100vh;
    color: var(--text);
    line-height: 1.5;
  }
  header {
    background: transparent;
    color: #fff;
    padding: 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  #brand { display: flex; align-items: center; gap: 14px; }
  #logoImg {
    height: 52px; width: 52px; object-fit: cover;
    border-radius: 10px; border: 2px solid rgba(255,255,255,0.6); background: #fff;
  }
  header h1 { margin: 0; font-size: 24px; font-weight: 600; }
  header p { margin: 4px 0 0; font-size: 14px; opacity: 0.92; }
  #userbar { display: flex; align-items: center; gap: 10px; font-size: 14px; }
  #userbar button {
    background: rgba(255,255,255,0.18); color: #fff; border: 1px solid rgba(255,255,255,0.5);
  }
  #userbar button:hover { background: rgba(255,255,255,0.32); }
  main {
    max-width: 920px;
    margin: 0 auto;
    padding: 12px 20px 60px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
  }
  label { display: block; font-size: 14px; color: var(--text-muted); margin-bottom: 6px; font-weight: 500; }
  textarea {
    width: 100%;
    min-height: 150px;
    resize: vertical;
    padding: 12px;
    font-size: 15px;
    font-family: inherit;
    border: 1px solid var(--border);
    border-radius: 8px;
    line-height: 1.6;
  }
  textarea:focus, select:focus, input:focus { outline: 2px solid var(--accent); border-color: var(--accent); }
  .controls { display: flex; flex-wrap: wrap; gap: 16px; align-items: flex-end; margin-top: 16px; }
  .control-group { display: flex; flex-direction: column; }
  select, input[type="number"] {
    padding: 9px 12px;
    font-size: 15px;
    font-family: inherit;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: #fff;
  }
  input[type="number"] { width: 90px; }
  button {
    font-family: inherit;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: #fff;
    padding: 9px 16px;
    transition: background 0.15s;
  }
  button:hover { background: #f0eee8; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  button.primary:hover { background: var(--accent-dark); }
  button.danger { color: #a32d2d; }
  .meta { font-size: 14px; color: var(--text-muted); margin: 4px 0 16px; }
  .groups { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 14px; }
  .group {
    border-radius: 12px;
    padding: 14px 16px;
    border: 1px solid transparent;
  }
  .group h3 { margin: 0 0 8px; font-size: 16px; font-weight: 600; }
  .group .member { font-size: 15px; padding: 3px 0; }
  .saved-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    background: #fff; border: 1px solid var(--border); border-radius: 999px;
    padding: 6px 8px 6px 14px; font-size: 14px;
  }
  .chip button { border: none; background: none; padding: 2px 6px; font-size: 16px; line-height: 1; color: var(--text-muted); }
  .chip button:hover { background: none; color: #a32d2d; }
  .chip .load { cursor: pointer; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-top: 14px; }
  .empty { color: var(--text-muted); font-size: 14px; font-style: italic; }
  /* group color ramps */
  .c0 { background:#EEEDFE; border-color:#CECBF6; color:#26215C; }
  .c1 { background:#E1F5EE; border-color:#9FE1CB; color:#04342C; }
  .c2 { background:#FAECE7; border-color:#F5C4B3; color:#4A1B0C; }
  .c3 { background:#FBEAF0; border-color:#F4C0D1; color:#4B1528; }
  .c4 { background:#E6F1FB; border-color:#B5D4F4; color:#042C53; }
  .c5 { background:#EAF3DE; border-color:#C0DD97; color:#173404; }
  .c6 { background:#FAEEDA; border-color:#FAC775; color:#412402; }
  /* auth */
  .auth-card { max-width: 420px; margin: 30px auto; }
  .auth-card h2 { margin: 0 0 14px; font-size: 20px; }
  .auth-field { margin-bottom: 14px; }
  .auth-field input { width: 100%; padding: 10px 12px; font-size: 15px; border: 1px solid var(--border); border-radius: 8px; font-family: inherit; }
  .auth-error { color: #a32d2d; font-size: 14px; min-height: 18px; margin: 0 0 8px; }
  .auth-note { font-size: 13px; color: var(--text-muted); background: #f3f1ea; border-radius: 8px; padding: 10px 12px; margin-bottom: 16px; }
  .auth-switch { margin-top: 16px; font-size: 14px; color: var(--text-muted); }
  .auth-switch a { color: var(--accent); cursor: pointer; text-decoration: underline; }
  /* admin */
  .section-title { font-size: 17px; font-weight: 600; margin: 0 0 12px; }
  .admin-user {
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    padding: 10px 0; border-bottom: 1px solid var(--border); flex-wrap: wrap;
  }
  .admin-user:last-child { border-bottom: none; }
  .admin-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .badge { font-size: 12px; padding: 2px 8px; border-radius: 999px; background:#EEEDFE; color:#26215C; margin-left: 8px; }
  .field-inline { margin-bottom: 14px; }
  .field-inline input[type="text"] { width: 100%; max-width: 420px; padding: 9px 12px; font-size: 15px; border: 1px solid var(--border); border-radius: 8px; font-family: inherit; }
  #adminLogoPreview { height: 64px; width: 64px; object-fit: cover; border-radius: 10px; border: 1px solid var(--border); margin-right: 12px; vertical-align: middle; }
</style>
</head>
<body>
<header>
  <div id="brand">
    <img id="logoImg" alt="logo" hidden>
    <div>
      <h1 id="appTitle">Groepsverdeler</h1>
      <p id="appSubtitle">Eerlijk en willekeurig groepen maken — zonder discussie</p>
    </div>
  </div>
  <div id="userbar" hidden>
    <span id="whoami"></span>
    <button id="adminBtn" hidden>Beheer</button>
    <button id="logoutBtn">Uitloggen</button>
  </div>
</header>
<main>

  <!-- ===== LOGIN / REGISTRATIE ===== -->
  <div class="card auth-card" id="authScreen">
    <h2 id="authTitle">Inloggen</h2>
    <div class="auth-note" id="authNote" hidden></div>

    <!-- Inloggen -->
    <div id="loginForm">
      <div class="auth-error" id="loginError"></div>
      <div class="auth-field">
        <label for="loginUser">Gebruikersnaam</label>
        <input type="text" id="loginUser" autocomplete="username">
      </div>
      <div class="auth-field">
        <label for="loginPass">Wachtwoord</label>
        <input type="password" id="loginPass" autocomplete="current-password">
      </div>
      <button class="primary" id="loginBtn">Inloggen</button>
      <div class="auth-switch" id="toRegister">Nog geen account? <a>Maak er een aan</a></div>
    </div>

    <!-- Account aanmaken -->
    <div id="registerForm" hidden>
      <div class="auth-error" id="registerError"></div>
      <div class="auth-field">
        <label for="regUser">Gebruikersnaam</label>
        <input type="text" id="regUser" autocomplete="username">
      </div>
      <div class="auth-field">
        <label for="regPass">Wachtwoord (min. 4 tekens)</label>
        <input type="password" id="regPass" autocomplete="new-password">
      </div>
      <div class="auth-field">
        <label for="regPass2">Wachtwoord herhalen</label>
        <input type="password" id="regPass2" autocomplete="new-password">
      </div>
      <button class="primary" id="registerBtn">Account aanmaken</button>
      <div class="auth-switch" id="toLogin">Heb je al een account? <a>Inloggen</a></div>
    </div>
  </div>

  <!-- ===== APP ===== -->
  <div id="appScreen" hidden>
    <div class="card">
      <label for="names">Namen (één per regel of gescheiden door komma's)</label>
      <textarea id="names" placeholder="Anna&#10;Bram&#10;Charlotte&#10;David&#10;..."></textarea>

      <div class="controls">
        <div class="control-group">
          <label for="mode">Verdelen op</label>
          <select id="mode">
            <option value="groups">Aantal groepen</option>
            <option value="size">Personen per groep</option>
          </select>
        </div>
        <div class="control-group">
          <label for="count" id="countLabel">Aantal groepen</label>
          <input type="number" id="count" min="1" value="2">
        </div>
        <button class="primary" id="go">Verdeel ↻</button>
      </div>

      <div class="row">
        <input type="text" id="listName" placeholder="Naam van de klaslijst" style="padding:9px 12px;font-size:15px;border:1px solid var(--border);border-radius:8px;font-family:inherit;">
        <button id="save">Lijst opslaan</button>
      </div>
      <div class="saved-list" id="savedList"></div>
    </div>

    <div class="card">
      <div class="meta" id="meta">Voer namen in en klik op <strong>Verdeel</strong>.</div>
      <div class="groups" id="result"></div>
    </div>
  </div>

  <!-- ===== ADMIN ===== -->
  <div id="adminScreen" hidden>
    <div class="card">
      <div class="row" style="margin-top:0;justify-content:space-between;">
        <h2 style="margin:0;font-size:20px;">Beheer</h2>
        <button id="backToApp">← Terug naar app</button>
      </div>
    </div>

    <div class="card">
      <div class="section-title">Uiterlijk</div>
      <div class="field-inline">
        <label for="setTitle">Titel</label>
        <input type="text" id="setTitle">
      </div>
      <div class="field-inline">
        <label for="setSubtitle">Ondertitel</label>
        <input type="text" id="setSubtitle">
      </div>
      <div class="field-inline">
        <label>Logo / foto</label>
        <img id="adminLogoPreview" alt="logo" hidden>
        <input type="file" id="logoFile" accept="image/*">
        <button id="removeLogo" class="danger" style="margin-left:8px;">Verwijderen</button>
        <div class="meta" style="margin-top:8px;">Kies een afbeelding kleiner dan 1 MB. Ze verschijnt links bovenaan.</div>
      </div>
      <button class="primary" id="saveSettings">Opslaan</button>
    </div>

    <div class="card">
      <div class="section-title">Gebruikers</div>
      <div id="userList"></div>
    </div>
  </div>

</main>

<script>
(function(){
  var USERS_KEY    = "groepsverdeler_users_v1";
  var SESSION_KEY  = "groepsverdeler_session_v1";
  var SETTINGS_KEY = "groepsverdeler_settings_v1";
  var STORAGE_KEY  = "groepsverdeler_lijsten_v1";

  // Vaste beheerder: enkel dit account is admin, op elk toestel.
  var ADMIN_USER = "jensatlas";
  var ADMIN_PASS = "Atlascopco2026";

  var DEFAULT_TITLE = "Groepsverdeler";
  var DEFAULT_SUBTITLE = "Eerlijk en willekeurig groepen maken — zonder discussie";

  function $(id){ return document.getElementById(id); }

  /* ---------- opslag-helpers ---------- */
  function getUsers(){ try { return JSON.parse(localStorage.getItem(USERS_KEY)) || {}; } catch(e){ return {}; } }
  function setUsers(o){ try { localStorage.setItem(USERS_KEY, JSON.stringify(o)); } catch(e){} }
  function getSettings(){ try { return JSON.parse(localStorage.getItem(SETTINGS_KEY)) || {}; } catch(e){ return {}; } }
  function setSettings(o){ try { localStorage.setItem(SETTINGS_KEY, JSON.stringify(o)); } catch(e){} }
  function currentUser(){ return localStorage.getItem(SESSION_KEY); }
  function setSession(u){ localStorage.setItem(SESSION_KEY, u); }
  function clearSession(){ localStorage.removeItem(SESSION_KEY); }
  function isAdmin(u){ return u === ADMIN_USER; }

  // Lichte hash — GEEN echte beveiliging, alleen om wachtwoorden niet als platte tekst te bewaren.
  function hashPw(pw){
    var h = 5381;
    for (var i=0; i<pw.length; i++){ h = (((h<<5)+h) ^ pw.charCodeAt(i)) >>> 0; }
    return h.toString(16);
  }

  /* ---------- uiterlijk toepassen ---------- */
  function applySettings(){
    var s = getSettings();
    $("appTitle").textContent = s.title || DEFAULT_TITLE;
    $("appSubtitle").textContent = s.subtitle || DEFAULT_SUBTITLE;
    document.title = s.title || DEFAULT_TITLE;
    var img = $("logoImg");
    if (s.logo){ img.src = s.logo; img.hidden = false; }
    else { img.hidden = true; img.removeAttribute("src"); }
  }

  /* ---------- navigatie ---------- */
  function route(){
    applySettings();
    var u = currentUser();
    var users = getUsers();
    if (u && u !== ADMIN_USER && !users[u]){ clearSession(); u = null; }   // account verdween → uitloggen

    if (!u){
      $("authScreen").hidden = false;
      $("appScreen").hidden = true;
      $("adminScreen").hidden = true;
      $("userbar").hidden = true;
      renderAuth();
      return;
    }

    $("authScreen").hidden = true;
    $("userbar").hidden = false;
    $("whoami").textContent = "Ingelogd als " + u;
    $("adminBtn").hidden = !isAdmin(u);
    showApp();
  }
  function showApp(){
    $("appScreen").hidden = false;
    $("adminScreen").hidden = true;
    renderSaved();
  }
  function showAdmin(){
    if (!isAdmin(currentUser())) return;
    $("appScreen").hidden = true;
    $("adminScreen").hidden = false;
    renderAdmin();
  }

  /* ---------- login / registratie ---------- */
  function renderAuth(){
    $("authNote").hidden = true;
    $("toLogin").hidden = false;
    showLogin();
  }
  function showLogin(){
    $("authTitle").textContent = "Inloggen";
    $("loginForm").hidden = false;
    $("registerForm").hidden = true;
    $("loginError").textContent = "";
  }
  function showRegister(){
    $("authTitle").textContent = "Account aanmaken";
    $("loginForm").hidden = true;
    $("registerForm").hidden = false;
    $("registerError").textContent = "";
  }

  function doLogin(){
    var u = $("loginUser").value.trim();
    var p = $("loginPass").value;
    if (u === ADMIN_USER){
      if (p !== ADMIN_PASS){ $("loginError").textContent = "Onjuiste gebruikersnaam of wachtwoord."; return; }
      setSession(u);
      $("loginUser").value = ""; $("loginPass").value = "";
      route();
      return;
    }
    var users = getUsers();
    if (!u || !users[u] || users[u].hash !== hashPw(p)){
      $("loginError").textContent = "Onjuiste gebruikersnaam of wachtwoord.";
      return;
    }
    setSession(u);
    $("loginUser").value = ""; $("loginPass").value = "";
    route();
  }
  function doRegister(){
    var u = $("regUser").value.trim();
    var p = $("regPass").value;
    var p2 = $("regPass2").value;
    var err = $("registerError");
    err.textContent = "";
    if (!u){ err.textContent = "Kies een gebruikersnaam."; return; }
    if (p.length < 4){ err.textContent = "Het wachtwoord moet minstens 4 tekens hebben."; return; }
    if (p !== p2){ err.textContent = "De wachtwoorden komen niet overeen."; return; }
    if (u.toLowerCase() === ADMIN_USER.toLowerCase()){ err.textContent = "Die gebruikersnaam is gereserveerd."; return; }
    var users = getUsers();
    if (users[u]){ err.textContent = "Die gebruikersnaam bestaat al."; return; }
    users[u] = { hash: hashPw(p), role: "user" };
    setUsers(users);
    setSession(u);
    $("regUser").value = ""; $("regPass").value = ""; $("regPass2").value = "";
    route();
  }

  /* ---------- admin ---------- */
  function renderAdmin(){
    var s = getSettings();
    $("setTitle").value = s.title || DEFAULT_TITLE;
    $("setSubtitle").value = s.subtitle || DEFAULT_SUBTITLE;
    var prev = $("adminLogoPreview");
    if (s.logo){ prev.src = s.logo; prev.hidden = false; }
    else { prev.hidden = true; prev.removeAttribute("src"); }

    var users = getUsers();
    var me = currentUser();
    var list = $("userList");
    list.innerHTML = "";
    Object.keys(users).forEach(function(name){
      var row = document.createElement("div");
      row.className = "admin-user";

      var left = document.createElement("div");
      var nameSpan = document.createElement("span");
      nameSpan.textContent = name;
      left.appendChild(nameSpan);
      if (users[name].role === "admin"){
        var badge = document.createElement("span");
        badge.className = "badge";
        badge.textContent = "beheerder";
        left.appendChild(badge);
      }

      var actions = document.createElement("div");
      actions.className = "admin-actions";

      var resetBtn = document.createElement("button");
      resetBtn.textContent = "Wachtwoord resetten";
      resetBtn.addEventListener("click", function(){
        var np = prompt('Nieuw wachtwoord voor "' + name + '":');
        if (np === null) return;
        if (np.length < 4){ alert("Het wachtwoord moet minstens 4 tekens hebben."); return; }
        var us = getUsers();
        us[name].hash = hashPw(np);
        setUsers(us);
        alert('Het wachtwoord van "' + name + '" is opnieuw ingesteld.');
      });
      actions.appendChild(resetBtn);

      var delBtn = document.createElement("button");
      delBtn.className = "danger";
      delBtn.textContent = "Verwijderen";
      if (name === me){
        delBtn.disabled = true;
        delBtn.title = "Je kunt je eigen account niet verwijderen.";
      }
      delBtn.addEventListener("click", function(){
        if (!confirm('Account "' + name + '" verwijderen?')) return;
        var us = getUsers();
        delete us[name];
        setUsers(us);
        renderAdmin();
      });
      actions.appendChild(delBtn);

      row.appendChild(left);
      row.appendChild(actions);
      list.appendChild(row);
    });
  }

  /* ---------- groepen verdelen ---------- */
  var namesEl = $("names");
  var modeEl = $("mode");
  var countEl = $("count");
  var countLabel = $("countLabel");
  var metaEl = $("meta");
  var resultEl = $("result");
  var listNameEl = $("listName");
  var savedListEl = $("savedList");

  modeEl.addEventListener("change", function(){
    countLabel.textContent = modeEl.value === "groups" ? "Aantal groepen" : "Personen per groep";
  });

  function parseNames(raw){
    return raw.split(/[\n,]+/).map(function(s){return s.trim();}).filter(Boolean);
  }
  function shuffle(a){
    for (var i=a.length-1; i>0; i--){
      var j = Math.floor(Math.random()*(i+1));
      var t=a[i]; a[i]=a[j]; a[j]=t;
    }
    return a;
  }

  function distribute(){
    var names = shuffle(parseNames(namesEl.value));
    resultEl.innerHTML = "";
    if (names.length === 0){ metaEl.innerHTML = "Voer eerst wat namen in."; return; }

    var n = Math.max(1, parseInt(countEl.value) || 1);
    var numGroups = modeEl.value === "groups"
      ? Math.min(n, names.length)
      : Math.ceil(names.length / n);

    var groups = [];
    for (var g=0; g<numGroups; g++) groups.push([]);
    names.forEach(function(name, i){ groups[i % numGroups].push(name); });

    metaEl.innerHTML = names.length + " personen verdeeld over " + numGroups + " groep" + (numGroups>1?"en":"") + ".";

    groups.forEach(function(members, idx){
      var div = document.createElement("div");
      div.className = "group c" + (idx % 7);
      var h = document.createElement("h3");
      h.textContent = "Groep " + (idx+1) + " (" + members.length + ")";
      div.appendChild(h);
      members.forEach(function(m){
        var rowm = document.createElement("div");
        rowm.className = "member";
        rowm.textContent = m;
        div.appendChild(rowm);
      });
      resultEl.appendChild(div);
    });
  }

  /* ---------- opgeslagen klaslijsten ---------- */
  function getSaved(){
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
    catch(e){ return {}; }
  }
  function setSaved(obj){
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(obj)); } catch(e){}
  }
  function renderSaved(){
    var saved = getSaved();
    var keys = Object.keys(saved);
    savedListEl.innerHTML = "";
    if (keys.length === 0){
      savedListEl.innerHTML = '<span class="empty">Nog geen opgeslagen lijsten.</span>';
      return;
    }
    keys.forEach(function(name){
      var chip = document.createElement("span");
      chip.className = "chip";
      var load = document.createElement("span");
      load.className = "load";
      load.textContent = name;
      load.title = "Klik om te laden";
      load.addEventListener("click", function(){
        namesEl.value = saved[name];
        listNameEl.value = name;
      });
      var del = document.createElement("button");
      del.textContent = "×";
      del.title = "Verwijder lijst";
      del.addEventListener("click", function(){
        var s = getSaved();
        delete s[name];
        setSaved(s);
        renderSaved();
      });
      chip.appendChild(load);
      chip.appendChild(del);
      savedListEl.appendChild(chip);
    });
  }

  /* ---------- gebeurtenissen koppelen ---------- */
  $("loginBtn").addEventListener("click", doLogin);
  $("loginPass").addEventListener("keydown", function(e){ if (e.key === "Enter") doLogin(); });
  $("registerBtn").addEventListener("click", doRegister);
  $("regPass2").addEventListener("keydown", function(e){ if (e.key === "Enter") doRegister(); });
  $("toRegister").querySelector("a").addEventListener("click", showRegister);
  $("toLogin").querySelector("a").addEventListener("click", showLogin);

  $("logoutBtn").addEventListener("click", function(){ clearSession(); route(); });
  $("adminBtn").addEventListener("click", showAdmin);
  $("backToApp").addEventListener("click", showApp);

  $("saveSettings").addEventListener("click", function(){
    var s = getSettings();
    s.title = $("setTitle").value.trim() || DEFAULT_TITLE;
    s.subtitle = $("setSubtitle").value.trim();
    setSettings(s);
    applySettings();
    alert("Opgeslagen.");
  });
  $("logoFile").addEventListener("change", function(){
    var f = this.files[0];
    if (!f) return;
    if (f.size > 1024*1024){ alert("Kies een afbeelding kleiner dan 1 MB."); this.value = ""; return; }
    var reader = new FileReader();
    reader.onload = function(){
      var s = getSettings();
      s.logo = reader.result;
      setSettings(s);
      applySettings();
      renderAdmin();
    };
    reader.readAsDataURL(f);
    this.value = "";
  });
  $("removeLogo").addEventListener("click", function(){
    var s = getSettings();
    delete s.logo;
    setSettings(s);
    applySettings();
    renderAdmin();
  });

  $("go").addEventListener("click", distribute);
  $("save").addEventListener("click", function(){
    var name = (listNameEl.value || "").trim();
    var content = namesEl.value.trim();
    if (!name){ alert("Geef de klaslijst eerst een naam."); return; }
    if (!content){ alert("Er zijn geen namen om op te slaan."); return; }
    var saved = getSaved();
    saved[name] = content;
    setSaved(saved);
    renderSaved();
  });

  /* ---------- start ---------- */
  route();
})();
</script>
</body>
</html>
